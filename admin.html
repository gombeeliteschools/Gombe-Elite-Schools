<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin - Gombe Elite Schools</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial;background:#f0f2f5;padding:20px}
        .container{max-width:1200px;margin:0 auto}
        .header{background:#0000ff;color:#fff;padding:20px;border-radius:10px 10px 0 0;display:flex;justify-content:space-between;align-items:center}
        .logout-btn{background:#e74c3c;padding:8px 16px;border-radius:5px;cursor:pointer;border:none;color:#fff}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin:20px 0}
        .stat-card{background:#fff;padding:20px;border-radius:10px;text-align:center;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
        .stat-number{font-size:36px;font-weight:bold;color:#0000ff}
        .card{background:#fff;padding:20px;border-radius:10px;margin-bottom:20px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
        table{width:100%;border-collapse:collapse}
        th,td{padding:10px;text-align:left;border-bottom:1px solid #ddd}
        th{background:#0000ff;color:#fff}
        .toggle-btn{background:#27ae60;color:#fff;border:none;padding:5px 10px;border-radius:5px;cursor:pointer}
        .toggle-btn.inactive{background:#e74c3c}
        select,button{padding:8px 12px;border-radius:5px}
        .promote-area{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:10px}
        .success{color:green;padding:10px;background:#d4edda;border-radius:5px;display:none;margin-top:10px}
        .spinner{display:inline-block;width:14px;height:14px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin 0.6s linear infinite;margin-right:6px}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>👑 Admin Dashboard - Gombe Elite Schools</h2>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
    <div class="stats-grid" id="stats"></div>
    <div class="card">
        <h3>📚 Class Promotion</h3>
        <div class="promote-area">
            <select id="promoteClassSelect">
                <option value="">-- Select Class --</option>
                <option>Nursery One</option>
                <option>Nursery Two</option>
                <option>Primary One</option>
                <option>Primary Two</option>
                <option>JSS One</option>
                <option>JSS Two</option>
                <option>SSS One</option>
                <option>SSS Two</option>
            </select>
            <button id="promoteBtn" onclick="promoteClass()">Promote to Next Class</button>
        </div>
        <div id="promoteMsg" class="success"></div>
    </div>
    <div class="card">
        <h3>👥 User Management</h3>
        <div style="overflow-x:auto">
            <table>
                <thead><tr><th>Email</th><th>Role</th><th>Name</th><th>Class</th><th>Status</th><th>Action</th></tr></thead>
                <tbody id="userTableBody"></tbody>
            </table>
        </div>
    </div>
</div>
<script>
    var users = [
        {email:'admin@gombe.edu', role:'admin', name:'Mohammad Ibrahim', class:'-', active:true},
        {email:'teacher1@gombe.edu', role:'teacher', name:'Mr. Ahmed', class:'SSS One', active:true},
        {email:'teacher2@gombe.edu', role:'teacher', name:'Mrs. Fatima', class:'JSS One', active:true},
        {email:'parent1@gmail.com', role:'parent', name:'Ali Musa', class:'-', active:true}
    ];
    
    function loadDashboard(){
        document.getElementById('stats').innerHTML=`
            <div class="stat-card"><div class="stat-number">245</div><div>Total Students</div></div>
            <div class="stat-card"><div class="stat-number">12</div><div>Total Teachers</div></div>
            <div class="stat-card"><div class="stat-number">₦1,250,000</div><div>Fees Collected</div></div>
        `;
        var html='';
        for(var i=0;i<users.length;i++){
            html+=`<tr><td>${users[i].email}</td><td>${users[i].role}</td><td>${users[i].name}</td><td>${users[i].class}</td>
            <td>${users[i].active ? '✅ Active' : '❌ Inactive'}</td>
            <td><button class="toggle-btn ${users[i].active ? '' : 'inactive'}" onclick="toggleUser(${i})">${users[i].active ? 'Deactivate' : 'Activate'}</button></td></tr>`;
        }
        document.getElementById('userTableBody').innerHTML=html;
    }
    
    function toggleUser(index){
        users[index].active = !users[index].active;
        loadDashboard();
        showMessage('User status updated','success');
    }
    
    function promoteClass(){
        var btn=document.getElementById('promoteBtn');
        btn.innerHTML='<span class="spinner"></span> Promoting...';
        btn.disabled=true;
        setTimeout(function(){
            btn.innerHTML='Promote to Next Class';
            btn.disabled=false;
            showMessage('Class promoted successfully!','success');
        },1000);
    }
    
    function showMessage(msg,type){
        var el=document.getElementById('promoteMsg');
        el.innerHTML=msg;
        el.style.display='block';
        setTimeout(function(){el.style.display='none';},3000);
    }
    
    function logout(){sessionStorage.clear();window.location.href='index.html';}
    loadDashboard();
</script>
</body>
</html>
